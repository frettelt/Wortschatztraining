<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Say It Right! – Zahlen auf Englisch</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0e17; --surface: #1a1927; --surface2: #232235;
    --gold: #f5c842; --teal: #3dd9c8; --rose: #ff6b8a;
    --green: #5be87a; --ink: #eeeaf8; --muted: #8884aa;
    --radius: 18px; --shadow: 0 8px 32px rgba(0,0,0,.45);
  }
  body {
    font-family: 'Baloo 2', cursive; background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 28px 16px 60px;
    background-image:
      radial-gradient(ellipse at 10% 0%, #3dd9c820 0%, transparent 50%),
      radial-gradient(ellipse at 90% 100%, #f5c84220 0%, transparent 50%);
  }

  header { text-align: center; margin-bottom: 20px; }
  header h1 {
    font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; letter-spacing: -1px;
    color: var(--gold); text-shadow: 0 0 40px #f5c84255;
  }
  header p { color: var(--muted); font-size: .9rem; margin-top: 4px; font-weight: 600; line-height: 1.5; }

  /* LANG TOGGLE */
  .lang-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .lang-btn {
    padding: 6px 18px; border-radius: 30px; border: 1.5px solid #2e2c45;
    background: var(--surface); color: var(--muted); font-family: 'Baloo 2', cursive;
    font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .lang-btn.active { background: var(--gold); color: #0f0e17; border-color: var(--gold); }

  .scorebar { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
  .chip {
    background: var(--surface); border-radius: 40px; padding: 7px 18px;
    font-weight: 700; font-size: .88rem; color: var(--muted); border: 1.5px solid #2e2c45;
    display: flex; align-items: center; gap: 6px;
  }
  .chip .val { font-size: 1.2rem; font-weight: 800; color: var(--ink); }
  .chip.streak .val { color: var(--gold); }

  .progress-wrap {
    width: 100%; max-width: 580px; background: var(--surface);
    border-radius: 20px; height: 8px; overflow: hidden; margin-bottom: 14px;
    border: 1px solid #2e2c45;
  }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--teal), var(--gold)); border-radius: 20px; transition: width .5s ease; }

  .card {
    background: var(--surface); border-radius: var(--radius); border: 1.5px solid #2e2c45;
    box-shadow: var(--shadow); padding: 32px 28px 24px; width: 100%; max-width: 580px; margin-bottom: 16px;
  }
  .level-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border-radius: 30px; padding: 4px 14px;
    font-size: .78rem; font-weight: 700; color: var(--muted); margin-bottom: 18px; border: 1px solid #2e2c45;
  }
  .level-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 8px var(--gold); }

  .number-display { text-align: center; margin-bottom: 24px; }
  .number-display .label { font-size: .75rem; text-transform: uppercase; letter-spacing: 3px; color: var(--muted); margin-bottom: 10px; }
  .number-display .big-number {
    font-family: 'DM Mono', monospace; font-size: clamp(2.8rem, 8vw, 4.5rem);
    font-weight: 500; color: var(--gold); text-shadow: 0 0 60px #f5c84244;
    letter-spacing: 2px; line-height: 1; animation: pop .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .input-label { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  textarea {
    width: 100%; background: var(--surface2); border: 2px solid #2e2c45;
    border-radius: 12px; padding: 14px 16px; font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 600; color: var(--ink); resize: none; outline: none;
    line-height: 1.5; transition: border-color .2s; min-height: 80px;
  }
  textarea::placeholder { color: #4a4768; }
  textarea:focus { border-color: var(--teal); }
  textarea.correct-border { border-color: var(--green) !important; }
  textarea.wrong-border   { border-color: var(--rose) !important; }

  .btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 110px; padding: 12px 18px; border: none; border-radius: 12px;
    font-family: 'Baloo 2', cursive; font-size: .95rem; font-weight: 800;
    cursor: pointer; transition: transform .15s, opacity .2s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: default; transform: none; }
  .btn-check { background: var(--teal); color: #0f0e17; box-shadow: 0 4px 20px #3dd9c840; }
  .btn-skip  { background: var(--surface2); color: var(--muted); border: 1.5px solid #2e2c45; }
  .btn-next  { background: var(--gold); color: #0f0e17; box-shadow: 0 4px 20px #f5c84240; display: none; }
  .btn-hint  { background: var(--surface2); color: var(--muted); border: 1.5px solid #2e2c45; flex: 0 0 auto; min-width: 48px; }

  .feedback {
    margin-top: 16px; border-radius: 12px; padding: 14px 16px; display: none;
    animation: slideUp .3s ease; font-size: .93rem; line-height: 1.6; font-weight: 600;
  }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .feedback.correct { background: #1a3324; border: 1.5px solid #2e6641; color: var(--green); display: block; }
  .feedback.wrong   { background: #2d1520; border: 1.5px solid #6b2535; color: var(--rose); display: block; }
  .feedback .answer-reveal { margin-top: 8px; font-size: .86rem; color: var(--muted); }
  .feedback .answer-reveal strong { color: var(--ink); }

  .checking { display: none; align-items: center; gap: 10px; color: var(--muted); font-weight: 700; font-size: .88rem; margin-top: 12px; }
  .checking.active { display: flex; }
  .spinner { width: 18px; height: 18px; border: 3px solid #2e2c45; border-top-color: var(--teal); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hint-box {
    background: var(--surface2); border: 1px solid #2e2c45; border-radius: 10px;
    padding: 10px 14px; margin-top: 10px; font-size: .86rem; color: var(--muted); display: none; line-height: 1.7;
  }
  .hint-box.active { display: block; }
  .hint-box strong { color: var(--ink); }

  /* BILINGUAL label style */
  .bilingual { display: flex; flex-direction: column; gap: 1px; }
  .bilingual .de { font-size: .95em; }
  .bilingual .en { font-size: .8em; color: var(--muted); font-style: italic; }

  .result-screen {
    display: none; text-align: center; width: 100%; max-width: 580px;
    background: var(--surface); border-radius: var(--radius); border: 1.5px solid #2e2c45;
    padding: 48px 32px; box-shadow: var(--shadow);
  }
  .result-screen.active { display: block; }
  .result-screen .trophy { font-size: 5rem; margin-bottom: 16px; }
  .result-screen h2 { font-size: 1.9rem; font-weight: 800; color: var(--gold); margin-bottom: 4px; }
  .result-screen h2 .sub { display: block; font-size: 1rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .result-screen .final { font-size: 3.5rem; font-weight: 800; color: var(--teal); margin: 10px 0; }
  .result-screen p { color: var(--muted); font-weight: 600; line-height: 1.6; }
  .stars { font-size: 2.2rem; letter-spacing: 6px; margin: 12px 0; }
</style>
</head>
<body>

<header>
  <h1>🔢 Say It Right!</h1>
  <p>Sieh die Zahl – schreib sie auf Englisch aus.<br>
     <span style="font-size:.85em;opacity:.7">See the number – write it out in English.</span></p>
</header>

<div class="lang-row">
  <button class="lang-btn active" id="langDE" onclick="setLang('de')">🇩🇪 Deutsch</button>
  <button class="lang-btn"        id="langEN" onclick="setLang('en')">🇬🇧 English</button>
</div>

<div class="scorebar">
  <div class="chip">✅ <span id="lblCorrect">Richtig</span> <span class="val" id="correctCount">0</span></div>
  <div class="chip">📋 <span id="lblRound">Runde</span> <span class="val" id="roundNum">1</span> / <span id="totalRounds">10</span></div>
  <div class="chip streak">🔥 Streak <span class="val" id="streakCount">0</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<div class="card" id="gameCard">
  <div class="level-badge"><span class="dot"></span> <span id="levelLabel">Level 1 – Zweistellige Zahlen</span></div>

  <div class="number-display">
    <div class="label" id="lblInstruction">Schreib diese Zahl auf Englisch aus</div>
    <div class="big-number" id="theNumber">–</div>
  </div>

  <div class="input-label" id="lblAnswer">Deine Antwort / Your answer</div>
  <textarea id="answerInput" placeholder="z.B. forty-two" rows="3"></textarea>

  <div class="hint-box" id="hintBox"></div>

  <div class="checking" id="checkingSpinner">
    <div class="spinner"></div> <span id="lblChecking">Wird überprüft …</span>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="btn-row">
    <button class="btn btn-check" id="checkBtn"  onclick="checkAnswer()">✔ <span id="lblCheck">Prüfen</span></button>
    <button class="btn btn-next"  id="nextBtn"   onclick="nextRound()"><span id="lblNext">Weiter</span> ➜</button>
    <button class="btn btn-skip"  id="skipBtn"   onclick="skipRound()"><span id="lblSkip">Überspringen</span></button>
    <button class="btn btn-hint"  id="hintBtn"   onclick="showHint()" title="Hinweis / Hint">💡</button>
  </div>
</div>

<div class="result-screen" id="resultScreen">
  <div class="trophy" id="trophyEmoji">🏆</div>
  <h2 id="resultTitle">Ausgezeichnet! <span class="sub">Excellent!</span></h2>
  <div class="final" id="finalScore">0 / 10</div>
  <div class="stars" id="resultStars">⭐⭐⭐</div>
  <p id="resultMsg"></p>
  <div class="btn-row" style="margin-top:28px; justify-content:center;">
    <button class="btn btn-check" style="flex:0 0 auto;" onclick="resetGame()">🔄 <span id="lblPlay">Nochmal spielen</span></button>
  </div>
</div>

<script>
// ── TRANSLATIONS ──────────────────────────────────────────────────────────────
const T = {
  de: {
    instruction:   "Schreib diese Zahl auf Englisch aus",
    answerLabel:   "Deine Antwort",
    placeholder:   "z.B. forty-two",
    checking:      "Wird überprüft …",
    check:         "Prüfen",
    next:          "Weiter",
    nextLast:      "🏁 Ergebnis",
    skip:          "Überspringen",
    correct:       "Richtig",
    round:         "Runde",
    playAgain:     "Nochmal spielen",
    modelAnswer:   "Musterlösung",
    hintLabel:     "💡 Aufteilen hilft:",
    hintLast:      "→ der Rest",
    levelLabels: [
      "Level 1 – Zweistellige Zahlen (11–99)",
      "Level 1 – Zweistellige Zahlen (11–99)",
      "Level 2 – Dreistellige Zahlen (100–999)",
      "Level 3 – Tausender (1.000–9.999)",
      "Level 4 – Zehntausender (10.000–99.999)",
    ],
    results: [
      { title: "Ausgezeichnet!", sub: "Excellent!", stars: "⭐⭐⭐", msg: "Du kennst deine Zahlen wirklich gut! / You really know your numbers!" },
      { title: "Gut gemacht!", sub: "Good job!", stars: "⭐⭐", msg: "Es wird von Runde zu Runde besser! / Getting better every round!" },
      { title: "Weiter üben!", sub: "Keep practising!", stars: "⭐", msg: "Zahlen auf Englisch sind knifflig – probier's nochmal! / Numbers in English are tricky – try again!" },
    ]
  },
  en: {
    instruction:   "Write this number in words",
    answerLabel:   "Your answer",
    placeholder:   "e.g. forty-two",
    checking:      "Claude is checking your answer…",
    check:         "Check",
    next:          "Next",
    nextLast:      "🏁 Results",
    skip:          "Skip",
    correct:       "Correct",
    round:         "Round",
    playAgain:     "Play Again",
    modelAnswer:   "Model answer",
    hintLabel:     "💡 Break it down:",
    hintLast:      "→ the last part",
    levelLabels: [
      "Level 1 – Tens (11–99)",
      "Level 1 – Tens (11–99)",
      "Level 2 – Hundreds (100–999)",
      "Level 3 – Thousands (1,000–9,999)",
      "Level 4 – Ten-thousands (10,000–99,999)",
    ],
    results: [
      { title: "Excellent!", sub: "", stars: "⭐⭐⭐", msg: "You really know your numbers!" },
      { title: "Good job!", sub: "", stars: "⭐⭐", msg: "Getting better every round!" },
      { title: "Keep practising!", sub: "", stars: "⭐", msg: "Numbers in English are tricky – try again!" },
    ]
  }
};

let lang = 'de';

function setLang(l) {
  lang = l;
  document.getElementById('langDE').classList.toggle('active', l === 'de');
  document.getElementById('langEN').classList.toggle('active', l === 'en');
  const t = T[l];
  document.getElementById('lblInstruction').textContent = t.instruction;
  document.getElementById('answerInput').placeholder    = t.placeholder;
  document.getElementById('lblAnswer').textContent      = t.answerLabel;
  document.getElementById('lblChecking').textContent    = t.checking;
  document.getElementById('lblCheck').textContent       = t.check;
  document.getElementById('lblSkip').textContent        = t.skip;
  document.getElementById('lblCorrect').textContent     = t.correct;
  document.getElementById('lblRound').textContent       = t.round;
  document.getElementById('lblPlay').textContent        = t.playAgain;
  // level label
  const lvlIdx = getLevel(currentRound || 1)._idx;
  document.getElementById('levelLabel').textContent = t.levelLabels[lvlIdx];
  // next button if visible
  const nb = document.getElementById('nextBtn');
  if (nb.style.display !== 'none') {
    document.getElementById('lblNext').textContent = (currentRound >= TOTAL_ROUNDS) ? t.nextLast : t.next;
  } else {
    document.getElementById('lblNext').textContent = t.next;
  }
}

// ── LEVELS ────────────────────────────────────────────────────────────────────
const LEVELS = [
  { _idx: 0, min: 11,    max: 99 },
  { _idx: 1, min: 11,    max: 99 },
  { _idx: 2, min: 100,   max: 999 },
  { _idx: 3, min: 1000,  max: 9999 },
  { _idx: 4, min: 10000, max: 99999 },
];
const TOTAL_ROUNDS = 10;
let currentRound, correctCount, streak, currentNumber, gameOver;

function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function formatUS(n) { return n.toLocaleString('en-US'); }

function getLevel(round) {
  if (round <= 2) return LEVELS[0];
  if (round <= 4) return LEVELS[2];
  if (round <= 7) return LEVELS[3];
  return LEVELS[4];
}

function generateNumber(round) {
  const lvl = getLevel(round);
  return randInt(lvl.min, lvl.max);
}

// ── HINT ──────────────────────────────────────────────────────────────────────
function buildHint(n) {
  const t = T[lang];
  const parts = [];
  let rem = n;
  if (rem >= 1000) {
    const th = Math.floor(rem / 1000);
    parts.push(`<strong>${formatUS(th * 1000)}</strong> → ${th} thousand`);
    rem -= th * 1000;
  }
  if (rem >= 100) {
    const h = Math.floor(rem / 100);
    parts.push(`<strong>${h * 100}</strong> → ${['','one','two','three','four','five','six','seven','eight','nine'][h]} hundred`);
    rem -= h * 100;
  }
  if (rem > 0) parts.push(`<strong>${rem}</strong> ${t.hintLast}`);
  return t.hintLabel + '<br>' + parts.join('<br>');
}

// ── GAME CONTROL ──────────────────────────────────────────────────────────────
function resetGame() {
  currentRound = 0; correctCount = 0; streak = 0; gameOver = false;
  document.getElementById('resultScreen').classList.remove('active');
  document.getElementById('gameCard').style.display      = '';
  document.querySelector('.scorebar').style.display      = '';
  document.querySelector('.progress-wrap').style.display = '';
  document.getElementById('totalRounds').textContent = TOTAL_ROUNDS;
  updateScore();
  loadRound();
}

function loadRound() {
  currentRound++;
  currentNumber = generateNumber(currentRound);
  const t = T[lang];
  const lvl = getLevel(currentRound);

  document.getElementById('roundNum').textContent     = currentRound;
  document.getElementById('progressBar').style.width  = ((currentRound - 1) / TOTAL_ROUNDS * 100) + '%';
  document.getElementById('levelLabel').textContent   = t.levelLabels[lvl._idx];
  document.getElementById('theNumber').textContent    = formatUS(currentNumber);
  document.getElementById('lblInstruction').textContent = t.instruction;
  document.getElementById('lblNext').textContent      = t.next;

  const input = document.getElementById('answerInput');
  input.value = ''; input.className = ''; input.disabled = false;
  input.placeholder = t.placeholder;
  input.focus();

  document.getElementById('feedback').className    = 'feedback';
  document.getElementById('feedback').innerHTML    = '';
  document.getElementById('hintBox').className     = 'hint-box';
  document.getElementById('hintBox').innerHTML     = '';
  document.getElementById('checkingSpinner').classList.remove('active');
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('checkBtn').disabled      = false;
  document.getElementById('skipBtn').style.display  = '';
  document.getElementById('nextBtn').style.display  = 'none';
  document.getElementById('hintBtn').disabled       = false;
}

function updateScore() {
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('streakCount').textContent  = streak;
}

// ── ENTER KEY ─────────────────────────────────────────────────────────────────
document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (document.getElementById('nextBtn').style.display !== 'none') nextRound();
    else checkAnswer();
  }
});

// ── CHECK VIA CLAUDE API ──────────────────────────────────────────────────────
async function checkAnswer() {
  const input = document.getElementById('answerInput');
  const userAnswer = input.value.trim();
  if (!userAnswer) { input.focus(); return; }

  document.getElementById('checkBtn').disabled = true;
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('checkingSpinner').classList.add('active');
  document.getElementById('lblChecking').textContent = T[lang].checking;

  const feedbackLang = lang === 'de'
    ? 'Respond in German (feedback sentence in German, model_answer always in English words).'
    : 'Respond in English.';

  const prompt = `A student is learning to write numbers in English words.
The number shown was: ${currentNumber} (formatted as "${formatUS(currentNumber)}")
The student wrote: "${userAnswer}"

Is the student's answer correct or acceptable?
Rules:
- BOTH British and American English are equally correct.
  - American: "three hundred five" (no "and")
  - British: "three hundred and five" (with "and") — both valid!
- Hyphens in compound numbers (e.g. "twenty-three") are optional
- Commas after "thousand" are optional
- Minor spelling errors (one wrong letter) are acceptable
- The model_answer must always be written in English number words

${feedbackLang}

Reply ONLY in this exact JSON format (no markdown):
{"correct": true/false, "feedback": "one short encouraging sentence", "model_answer": "the number in English words"}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 200,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const raw = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const result = JSON.parse(raw.replace(/```json|```/g, '').trim());
    showFeedback(result.correct, result.feedback, result.model_answer);
  } catch (err) {
    const fallback = clientSideCheck(userAnswer, currentNumber);
    showFeedback(fallback.correct, fallback.feedback, fallback.model_answer);
  }
}

// ── FALLBACK ──────────────────────────────────────────────────────────────────
function clientSideCheck(answer, n) {
  const expected = numberToWords(n).toLowerCase();
  const given = answer.toLowerCase().replace(/\s+/g,' ').replace(/-/g,' ').trim();
  const norm  = s => s.replace(/,/g,'').replace(/-/g,' ').replace(/\s+/g,' ').trim();
  const correct = norm(given) === norm(expected) || norm(given) === norm(expected.replace(/ and /g,' '));
  const ok  = lang === 'de' ? "Super gemacht!" : "Great job!";
  const nok = lang === 'de' ? "Nicht ganz – schau dir die Musterlösung an." : "Not quite – check the model answer below.";
  return { correct, feedback: correct ? ok : nok, model_answer: numberToWords(n) };
}

function numberToWords(n) {
  if (n === 0) return 'zero';
  const ones = ['','one','two','three','four','five','six','seven','eight','nine',
                 'ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen',
                 'seventeen','eighteen','nineteen'];
  const tens = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
  function under1000(num) {
    if (num === 0) return '';
    if (num < 20)  return ones[num];
    if (num < 100) return tens[Math.floor(num/10)] + (num%10 ? '-' + ones[num%10] : '');
    const h = Math.floor(num/100), rest = num % 100;
    return ones[h] + ' hundred' + (rest ? ' ' + under1000(rest) : '');
  }
  const th = Math.floor(n / 1000), rem = n % 1000;
  let result = '';
  if (th > 0) result += under1000(th) + ' thousand';
  if (rem > 0) result += (th > 0 ? ', ' : '') + under1000(rem);
  return result;
}

// ── SHOW FEEDBACK ─────────────────────────────────────────────────────────────
function showFeedback(correct, feedbackMsg, modelAnswer) {
  document.getElementById('checkingSpinner').classList.remove('active');
  const input = document.getElementById('answerInput');
  input.disabled = true;
  const t = T[lang];

  const fb = document.getElementById('feedback');
  if (correct) {
    fb.className = 'feedback correct';
    fb.innerHTML = `✅ ${feedbackMsg}`;
    input.classList.add('correct-border');
    correctCount++; streak++;
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = `❌ ${feedbackMsg}<div class="answer-reveal">✏️ ${t.modelAnswer}: <strong>${modelAnswer}</strong></div>`;
    input.classList.add('wrong-border');
    streak = 0;
  }
  updateScore();

  document.getElementById('checkBtn').style.display = 'none';
  const nb = document.getElementById('nextBtn');
  nb.style.display = 'flex';
  document.getElementById('lblNext').textContent = currentRound < TOTAL_ROUNDS ? t.next : t.nextLast;
}

function skipRound() {
  streak = 0; updateScore();
  if (currentRound >= TOTAL_ROUNDS) { showResult(); return; }
  loadRound();
}

function nextRound() {
  if (currentRound >= TOTAL_ROUNDS) { showResult(); return; }
  loadRound();
}

function showHint() {
  const box = document.getElementById('hintBox');
  box.innerHTML = buildHint(currentNumber);
  box.classList.add('active');
  document.getElementById('hintBtn').disabled = true;
}

// ── RESULT ────────────────────────────────────────────────────────────────────
function showResult() {
  gameOver = true;
  document.getElementById('gameCard').style.display      = 'none';
  document.querySelector('.scorebar').style.display      = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';

  const rs = document.getElementById('resultScreen');
  rs.classList.add('active');
  const pct = correctCount / TOTAL_ROUNDS;
  const res = T[lang].results;
  const r = pct >= .8 ? res[0] : pct >= .5 ? res[1] : res[2];

  document.getElementById('trophyEmoji').textContent  = pct >= .8 ? '🏆' : pct >= .5 ? '👍' : '😅';
  document.getElementById('resultTitle').innerHTML    = r.title + (r.sub ? `<span class="sub">${r.sub}</span>` : '');
  document.getElementById('finalScore').textContent   = `${correctCount} / ${TOTAL_ROUNDS}`;
  document.getElementById('resultStars').textContent  = r.stars;
  document.getElementById('resultMsg').textContent    = r.msg;
  document.getElementById('lblPlay').textContent      = T[lang].playAgain;
}

resetGame();
</script>
</body>
</html>
